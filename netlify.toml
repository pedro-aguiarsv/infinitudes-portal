# =============================================================
# Netlify · Configuração de build do Astro
# =============================================================

[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Caching agressivo dos assets gerados pelo Astro
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts: aceitar CORS (caso um dia self-host)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect 404 padrão (opcional, se criar src/pages/404.astro)
# [[redirects]]
#   from   = "/*"
#   to     = "/404"
#   status = 404
